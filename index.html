<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=5.0">
<title>Montagem de Treino — MVP</title>

<!-- Rodar em tela cheia (sem barra do Safari) quando adicionado à Tela de Início -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treino">
<meta name="theme-color" content="#1B1D24">
<style>
  :root{
    --wall:
      radial-gradient(120% 90% at 12% 4%, #2b3c7a 0%, rgba(43,60,122,0) 55%),
      radial-gradient(100% 80% at 92% 12%, #5a2b78 0%, rgba(90,43,120,0) 52%),
      radial-gradient(130% 100% at 82% 100%, #10424a 0%, rgba(16,66,74,0) 55%),
      #0a0c15;
    --glass: rgba(255,255,255,0.10);
    --glass2: rgba(255,255,255,0.17);
    --stroke: rgba(255,255,255,0.20);
    --sheet: rgba(24,25,34,0.55);
    --modal: rgba(28,29,40,0.90);
    --text: #ffffff;
    --sub: rgba(235,235,245,0.64);
    --faint: rgba(235,235,245,0.34);
    --pill: rgba(255,255,255,0.14);
    --accent: #5B8DEF;
    --accent-soft: rgba(91,141,239,0.20);
    --danger: #E5695B;
    --radius: 24px;
    --radius-card: 16px;
    --radius-sm: 12px;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, sans-serif;
  }
  [data-theme="light"]{
    --wall:
      radial-gradient(120% 90% at 10% 0%, #c9ddff 0%, rgba(201,221,255,0) 55%),
      radial-gradient(100% 80% at 96% 8%, #ecd8ff 0%, rgba(236,216,255,0) 55%),
      radial-gradient(130% 100% at 85% 100%, #cdefe8 0%, rgba(205,239,232,0) 55%),
      #eef1f7;
    --glass: rgba(255,255,255,0.55);
    --glass2: rgba(255,255,255,0.85);
    --stroke: rgba(255,255,255,0.90);
    --sheet: rgba(255,255,255,0.60);
    --modal: rgba(248,249,252,0.94);
    --text: #1c1c1e;
    --sub: rgba(60,60,67,0.64);
    --faint: rgba(60,60,67,0.38);
    --pill: rgba(120,120,128,0.16);
    --accent: #2f6fe0;
    --accent-soft: rgba(47,111,224,0.14);
    --danger: #d64b3f;
  }
  *{ box-sizing:border-box; }
  html,body{ -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
  input,select,textarea{ -webkit-user-select:text; user-select:text; }
  /* O picker nativo do <select> (lista de opções) usa as cores do sistema, não as nossas
     variáveis — em modo escuro isso deixava texto claro sobre fundo claro (baixo contraste).
     Forçando color-scheme:light só no picker nativo, o texto das opções fica sempre escuro
     sobre fundo claro, legível nos dois temas. A caixa fechada do select continua com
     nosso estilo normal (--pill, --text etc.), isso só afeta o menu suspenso do sistema. */
  select{ color-scheme: light; }
  /* iOS às vezes calcula 100vh maior que a área visível real (barra do Safari, notch, etc.),
     deixando uma tira sem o degradê embaixo do body. Colocando o mesmo fundo no <html>
     também, essa tira (se existir) mostra o mesmo gradiente em vez de ficar cortada. */
  /* O gradiente de fundo ficava cortado embaixo em alguns aparelhos porque 100vh/100dvh no iOS
     às vezes calcula uma altura diferente da área visível real (por causa da barra do Safari,
     notch etc.), deixando uma tira sem fundo. Resolvendo de vez com uma camada position:fixed
     que cobre exatamente a viewport visível a qualquer momento, sem depender de vh/dvh. */
  .app-bg{
    position:fixed; inset:0; z-index:-1;
    background:var(--wall);
  }
  html{ height:100%; }
  body{
    margin:0; color:var(--text);
    font-family:var(--sans); -webkit-font-smoothing:antialiased;
    min-height:100vh; min-height:100dvh; height:100vh; height:100dvh;
    display:flex; flex-direction:column; overflow:hidden;
  }

  /* Top bar */
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-shrink:0;
    padding: calc(12px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) 8px calc(18px + env(safe-area-inset-left));
  }
  .topbar-title{ background:none; border:none; padding:0; text-align:left; cursor:pointer; color:var(--text); font-family:var(--sans); display:flex; flex-direction:column; gap:3px; min-width:0; }
  .topbar-title .ov{ font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--sub); }
  .topbar-title .nm{ display:flex; align-items:center; gap:7px; font-size:21px; font-weight:800; letter-spacing:-0.02em; }
  .topbar-title .nm svg{ width:15px; height:15px; opacity:0.55; flex-shrink:0; }
  .topbar-title:active{ opacity:0.7; }
  .theme-toggle{
    flex-shrink:0; display:flex; align-items:center; gap:7px; height:38px; padding:0 14px;
    background:var(--glass); border:1px solid var(--stroke); color:var(--text); border-radius:999px;
    font:600 13px/1 var(--sans); cursor:pointer;
    -webkit-backdrop-filter:blur(20px) saturate(1.6); backdrop-filter:blur(20px) saturate(1.6);
  }
  .theme-toggle:active{ transform:scale(0.97); }
  .theme-toggle svg{ width:15px; height:15px; }

  .fab{
    position:fixed; bottom:calc(20px + env(safe-area-inset-bottom)); right:calc(20px + env(safe-area-inset-right)); z-index:70;
    width:56px; height:56px; background:var(--accent); color:#fff; border:none; border-radius:50%;
    font-size:28px; line-height:1; display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 8px 24px rgba(0,0,0,0.30); transition:transform 0.15s ease;
  }
  .fab:active{ transform:scale(0.94); }

  .volume-fab{
    position:fixed; bottom:calc(88px + env(safe-area-inset-bottom)); right:calc(20px + env(safe-area-inset-right)); z-index:66;
    width:48px; height:48px; background:var(--glass); color:var(--text); border:1px solid var(--stroke);
    border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;
    -webkit-backdrop-filter:blur(20px) saturate(1.6); backdrop-filter:blur(20px) saturate(1.6);
    box-shadow:0 6px 18px rgba(0,0,0,0.22); transition:transform 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .volume-fab:active{ transform:scale(0.94); }
  .volume-fab-icon{ display:flex; align-items:center; justify-content:center; line-height:1; }
  .volume-fab.active{ background:var(--accent); color:#fff; border-color:transparent; }
  .volume-fab-dot{
    position:absolute; top:-3px; right:-3px; min-width:18px; height:18px; padding:0 4px;
    background:var(--accent); color:#fff; border-radius:9px; font-size:10px; font-weight:700;
    display:flex; align-items:center; justify-content:center; font-family:var(--mono);
    box-shadow:0 0 0 2px rgba(10,12,20,0.5);
  }
  .volume-panel{
    position:fixed; right:calc(20px + env(safe-area-inset-right)); bottom:calc(144px + env(safe-area-inset-bottom)); z-index:65; width:230px; max-width:calc(100vw - 40px);
    max-height:min(50vh, 380px); overflow-y:auto;
    background:var(--modal); border:1px solid var(--stroke); border-radius:var(--radius-card);
    -webkit-backdrop-filter:blur(40px) saturate(1.8); backdrop-filter:blur(40px) saturate(1.8);
    box-shadow:0 18px 44px rgba(0,0,0,0.32); padding:14px; display:none;
  }
  .volume-panel.show{ display:block; }
  .btn-primary{
    background:var(--pill); color:var(--text); border:1px solid var(--stroke);
    border-radius:var(--radius-sm); padding:10px 14px; font-size:13px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; gap:6px; font-family:var(--sans);
  }
  .btn-primary:active{ transform:scale(0.97); }

  /* Board */
  .board{
    flex:1; overflow-x:auto; overflow-y:auto; display:flex; gap:14px;
    padding:4px calc(16px + env(safe-area-inset-right)) 96px calc(16px + env(safe-area-inset-left));
    align-items:flex-start;
  }
  .column{
    background:var(--sheet); border:1px solid var(--stroke); border-radius:var(--radius);
    flex:1 1 240px; min-width:210px; max-width:300px; display:flex; flex-direction:column; overflow:hidden;
    -webkit-backdrop-filter:blur(30px) saturate(1.8); backdrop-filter:blur(30px) saturate(1.8);
    box-shadow:0 14px 34px rgba(0,0,0,0.20), inset 0 1px 0 rgba(255,255,255,0.16);
    transition:opacity 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
  }
  .column.dragover{ border-color:var(--accent); }
  .col-header{
    padding:12px 12px 10px; display:flex; align-items:center; gap:6px;
    border-bottom:1px solid var(--stroke); flex-shrink:0;
  }
  .col-drag-handle{
    background:var(--pill); border:none; color:var(--sub); width:24px; height:24px;
    border-radius:8px; cursor:grab; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; touch-action:none;
  }
  .col-drag-handle:active{ cursor:grabbing; }
  .col-drag-handle svg{ width:12px; height:12px; }
  .column.col-dragging{ opacity:0.5; transform:rotate(-1.5deg) scale(0.98); }
  .col-title{
    font-size:15px; font-weight:800; background:transparent; border:none; color:var(--text);
    width:100%; min-width:0; font-family:var(--sans); outline:none; letter-spacing:-0.01em;
  }
  .col-add-btn{
    background:var(--pill); border:none; color:var(--text); width:26px; height:26px;
    border-radius:8px; cursor:pointer; font-size:17px; line-height:1; flex-shrink:0;
  }
  .col-header-btns{ display:flex; align-items:center; gap:5px; flex-shrink:0; }

  .col-body{
    padding:8px; display:flex; flex-direction:column; gap:8px;
  }
  .card{
    display:flex; align-items:stretch; border-radius:var(--radius-card); cursor:grab; position:relative;
    border:1px solid var(--stroke);
    transition:opacity 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:active{ cursor:grabbing; }
  .card.dragging{ opacity:0.5; transform:scale(0.98); box-shadow:0 12px 26px rgba(0,0,0,0.28); z-index:2; }
  .card-main{
    flex:1; min-width:0; position:relative; padding:11px 34px 11px 13px;
    display:flex; flex-direction:column; gap:5px;
  }
  .card-actions{ position:absolute; top:8px; right:8px; display:flex; gap:4px; }
  .card-del{
    background:var(--pill); border:none; border-radius:7px; width:20px; height:20px;
    display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px;
    line-height:1; padding:0; color:var(--sub);
  }
  .card-title-row{ display:flex; align-items:center; gap:8px; }
  .card-name{
    flex:1; min-width:0; font-size:14.5px; font-weight:700; letter-spacing:-0.01em; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .card-sub{ display:flex; align-items:center; gap:8px; margin-left:25px; }
  .card-num{
    flex-shrink:0; width:17px; height:17px; border-radius:50%; background:var(--pill);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:10px; font-weight:800; color:var(--sub);
  }
  .card-reps{ font-family:var(--mono); font-size:11.5px; font-weight:600; color:var(--sub); }
  .drop-indicator{
    background:var(--accent); border-radius:5px; flex-shrink:0;
    box-shadow:0 0 0 4px var(--accent-soft);
  }
  .drop-indicator.horizontal{ height:4px; width:100%; margin:1px 0; }
  .drop-indicator.vertical{ width:5px; align-self:stretch; }
  .col-footer{
    border-top:1px solid var(--stroke); padding:12px 14px; display:flex; flex-direction:column; gap:6px;
    flex-shrink:0;
  }
  .footer-label{ font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--faint); font-family:var(--mono); margin-bottom:2px; }
  .col-total-num{ font-family:var(--mono); font-weight:800; font-size:17px; color:var(--text); }
  .vol-toggle{
    background:var(--pill); border:1px solid var(--stroke); color:var(--sub);
    width:26px; height:26px; border-radius:9px; cursor:pointer; font-size:16px; line-height:1;
    flex-shrink:0; font-family:var(--sans);
  }
  .vol-badge{
    display:flex; align-items:center; gap:8px;
    padding:7px 11px; border-radius:10px; font-size:12px; font-family:var(--mono);
  }
  .vol-badge .dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .vol-badge .name{ flex:1; font-family:var(--sans); font-weight:600; color:var(--text); }
  .vol-badge .status{ font-size:12px; }
  .vol-badge.selectable{ cursor:pointer; border:1.5px solid transparent; }
  .vol-badge.selectable:active{ opacity:0.8; }
  .vol-badge.selectable.selected{ border-color:var(--accent); }
  .vol-badge .emoji{ font-size:14px; flex-shrink:0; }
  .vol-badge .check{ font-size:11px; color:var(--accent); flex-shrink:0; }

  /* Column actions (duplicar + remover) */
  .col-actions{ display:flex; gap:8px; padding:0 12px 12px; flex-shrink:0; }
  .col-actions button{
    flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:9px;
    border-radius:10px; font:600 12px/1 var(--sans); cursor:pointer; border:1px solid var(--stroke);
    background:var(--pill);
  }
  .col-actions button:active{ transform:scale(0.97); }
  .col-actions .col-dup-btn2{ color:var(--sub); }
  .col-actions .col-del2{ color:var(--danger); }
  .col-actions button svg{ width:13px; height:13px; }

  /* Modal */
  .overlay{
    position:fixed; inset:0; background:rgba(8,9,14,0.5); display:none;
    align-items:center; justify-content:center; z-index:50; padding:20px;
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  }
  .overlay.show{ display:flex; }
  .modal{
    background:var(--modal); border:1px solid var(--stroke); border-radius:var(--radius);
    width:100%; max-width:360px; max-height:82vh; overflow-y:auto; padding:22px 22px 0; color:var(--text);
    -webkit-backdrop-filter:blur(40px) saturate(1.8); backdrop-filter:blur(40px) saturate(1.8);
    box-shadow:0 30px 80px rgba(0,0,0,0.42);
  }
  .modal h3{ margin:0 0 14px; font-size:18px; font-weight:800; letter-spacing:-0.01em; }
  .modal-tabs{ display:flex; gap:6px; margin-bottom:14px; }
  .modal-tabs button{
    flex:1; background:var(--pill); border:1px solid var(--stroke); color:var(--sub);
    padding:9px; border-radius:var(--radius-sm); font-size:12px; font-weight:600; cursor:pointer; font-family:var(--sans);
  }
  .modal-tabs button.active{ color:#fff; background:var(--accent); border-color:transparent; }
  .catalog-item{
    display:flex; align-items:center; gap:9px; padding:11px 9px; border-radius:var(--radius-sm); cursor:pointer;
    border:1.5px solid transparent;
  }
  .catalog-item:hover{ background:var(--glass); }
  .catalog-item.selected{ background:var(--accent-soft); border-color:var(--accent); }
  .catalog-item .check{
    width:20px; height:20px; border-radius:7px; border:1.5px solid var(--stroke); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff;
  }
  .catalog-item.selected .check{ background:var(--accent); border-color:var(--accent); }
  .catalog-item .dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .catalog-item .n{ font-size:13.5px; font-weight:700; }
  .catalog-item .m{ font-size:10.5px; color:var(--faint); }
  .field{ margin-bottom:11px; }
  .field label{ display:block; font-size:11px; color:var(--sub); margin-bottom:5px; }
  .field input, .field select{
    width:100%; background:var(--pill); border:1px solid var(--stroke); color:var(--text);
    border-radius:var(--radius-sm); padding:10px 11px; font-size:13.5px; font-family:var(--sans);
  }
  .row2{ display:flex; gap:8px; }
  .row2 .field{ flex:1; }
  .modal-actions{
    display:flex; gap:8px; margin:16px -22px 0; padding:14px 22px 22px;
    position:sticky; bottom:0; background:var(--modal); border-top:1px solid var(--stroke);
  }
  .modal-actions button{
    flex:1; padding:11px; border-radius:var(--radius-sm); font-size:13.5px; font-weight:700; cursor:pointer; font-family:var(--sans);
  }
  .modal-actions button:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn-cancel{ background:var(--pill); border:1px solid var(--stroke); color:var(--sub); }
  .btn-confirm{ background:var(--accent); border:none; color:#fff; }
  .secondary-row{ display:flex; gap:6px; align-items:flex-end; margin-bottom:8px; }
  .secondary-row .field{ margin-bottom:0; }
  .add-secondary{ background:var(--pill); border:1px solid var(--stroke); color:var(--sub); border-radius:var(--radius-sm); padding:10px 11px; font-size:12px; cursor:pointer; }
  .rm-secondary{ background:none; border:none; color:var(--faint); font-size:16px; cursor:pointer; padding:0 4px; }

  .plan-row{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:12px 13px; border-radius:var(--radius-sm); border:1.5px solid var(--stroke); cursor:pointer;
    background:var(--glass);
  }
  .plan-row.active{ border-color:var(--accent); background:var(--accent-soft); }
  .plan-row-main{ display:flex; flex-direction:column; gap:2px; min-width:0; }
  .plan-row-name{ font-size:13.5px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .plan-rename-input{
    width:100%; background:transparent; border:none; outline:none; padding:0;
    font-size:13.5px; font-weight:700; color:var(--text); font-family:var(--sans);
  }
  .plan-row-meta{ font-size:11px; color:var(--faint); }
  .plan-row-actions{ display:flex; align-items:center; gap:2px; flex-shrink:0; }
  .plan-row-dup{ background:none; border:none; color:var(--faint); cursor:pointer; padding:5px 6px; display:flex; align-items:center; justify-content:center; }
  .plan-row-dup svg{ width:15px; height:15px; }
  .plan-row-del{ background:none; border:none; color:var(--faint); font-size:16px; cursor:pointer; flex-shrink:0; padding:2px 6px; }

  .search-row{ display:flex; gap:8px; margin-bottom:10px; }
  .search-row input{
    flex:1.5; min-width:0; background:var(--pill); border:1px solid var(--stroke); color:var(--text);
    border-radius:var(--radius-sm); padding:10px 11px; font-size:13.5px; font-family:var(--sans);
  }
  .search-row select{
    flex:1; min-width:0; background:var(--pill); border:1px solid var(--stroke); color:var(--text);
    border-radius:var(--radius-sm); padding:10px 6px; font-size:11.5px; font-family:var(--sans);
    text-overflow:ellipsis;
  }
  .catalog-list{ max-height:44vh; overflow-y:auto; }
  .catalog-empty{ font-size:12px; color:var(--faint); padding:14px 4px; text-align:center; }

  /* Login */
  .auth-loading, .auth-gate{
    position:fixed; inset:0; z-index:200; background:var(--wall); background-attachment:fixed;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .auth-loading.hidden, .auth-gate.hidden{ display:none; }
  .auth-box{
    width:100%; max-width:340px; text-align:center;
    background:var(--modal); border:1px solid var(--stroke); border-radius:var(--radius);
    -webkit-backdrop-filter:blur(40px) saturate(1.8); backdrop-filter:blur(40px) saturate(1.8);
    box-shadow:0 30px 80px rgba(0,0,0,0.4); padding:32px 26px;
  }
  .auth-box h2{ font-size:22px; font-weight:800; letter-spacing:-0.02em; margin:0 0 8px; }
  .auth-box p{ font-size:13px; color:var(--sub); margin:0 0 20px; line-height:1.5; }
  .auth-box input{
    width:100%; background:var(--pill); border:1px solid var(--stroke); color:var(--text);
    border-radius:var(--radius-sm); padding:13px 14px; font-size:14px; font-family:var(--sans);
    margin-bottom:10px; text-align:center; outline:none;
  }
  .auth-box button{
    width:100%; background:var(--accent); color:#fff; border:none; border-radius:var(--radius-sm);
    padding:13px; font-size:14px; font-weight:700; cursor:pointer; font-family:var(--sans);
  }
  .auth-box button:disabled{ opacity:0.5; cursor:not-allowed; }
  .auth-status{ font-size:12px; color:var(--sub); margin-top:14px; min-height:16px; line-height:1.4; }
  .sign-out-row{ text-align:center; margin-top:6px; }
  .sign-out-link{ background:none; border:none; color:var(--faint); font-size:12px; cursor:pointer; padding:6px; }

  .undo-toast{
    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
    background:rgba(18,19,26,0.94); color:#fff; padding:12px 22px; border-radius:999px;
    font-size:13px; font-weight:700; font-family:var(--sans); z-index:200;
    -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px);
    opacity:0; pointer-events:none; transition:opacity 0.2s ease; white-space:nowrap;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
  }

function shade(hex, percent){
  const f = parseInt(hex.slice(1),16), t = percent<0?0:255, p = Math.abs(percent);
  const R = f>>16, G = f>>8 & 0x00FF, B = f & 0x0000FF;
  return "#" + (0x1000000 + (Math.round((t-R)*p)+R)*0x10000 + (Math.round((t-G)*p)+G)*0x100 + (Math.round((t-B)*p)+B)).toString(16).slice(1);
}
function luminance(hex){
  const c = hex.replace('#','');
  const r=parseInt(c.substr(0,2),16)/255, g=parseInt(c.substr(2,2),16)/255, b=parseInt(c.substr(4,2),16)/255;
  const a=[r,g,b].map(v=> v<=0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055,2.4));
  return 0.2126*a[0]+0.7152*a[1]+0.0722*a[2];
}

const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhoeHNkaXRlbHV3aXRod3BscGVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMzM2NzAsImV4cCI6MjA5ODYwOTY3MH0.XX4Wc-sTJJvYXcf7MwFegyUnddCHFdUXXrcbVDFaLGU';
const SUPABASE_CONFIGURED = SUPABASE_URL.startsWith('http') && SUPABASE_ANON_KEY.length > 20;

let currentUserId = null;
let remoteSaveTimer = null;

function saveRemoteStateDebounced(){
  if(!supabaseClient || !currentUserId) return;

  remoteSaveTimer = setTimeout(saveRemoteStateNow, 600);

const saved = loadFromStorage();
let appState;
// qual métrica aparece no botão redondo minimizado: 'geral' ou a chave de um grupo muscular
let volumeDisplaySelection = 'geral';

if(saved && Array.isArray(saved.plans) && saved.plans.length){
  appState = { plans: saved.plans, activePlanId: saved.activePlanId };
  if(!appState.plans.find(p=>p.id===appState.activePlanId)) appState.activePlanId = appState.plans[0].id;

}

// `state` sempre aponta pro plano ativo — trocar de plano reatribui essa referência
let state = appState.plans.find(p=>p.id===appState.activePlanId);

// ---------- HISTÓRICO DE DESFAZER / REFAZER ----------
// A cada renderAll(), comparamos o estado atual com o último "retrato" salvo.
// Se mudou, guardamos o retrato anterior na pilha — assim cada ação vira um passo de undo,
// sem precisar marcar manualmente cada botão que muda algo. Uma mudança nova sempre limpa
// o redo (regra clássica de undo/redo: não dá pra "refazer" depois de editar algo novo).
let undoStack = [];
let redoStack = [];
const MAX_UNDO = 30;
let lastSnapshot = JSON.stringify({ plans: appState.plans, activePlanId: appState.activePlanId });
let isRestoringUndo = false;

function captureUndoIfChanged(){
  if(isRestoringUndo) return;
  const current = JSON.stringify({ plans: appState.plans, activePlanId: appState.activePlanId });
  if(current !== lastSnapshot){
    undoStack.push(lastSnapshot);
    if(undoStack.length > MAX_UNDO) undoStack.shift();
    lastSnapshot = current;
    redoStack = [];
  }
}

function restoreSnapshot(json){
  isRestoringUndo = true;
  const restored = JSON.parse(json);
  appState.plans = restored.plans;
  appState.activePlanId = restored.activePlanId;
  state = appState.plans.find(p=>p.id===appState.activePlanId) || appState.plans[0];
  lastSnapshot = json;
  renderAll();
  isRestoringUndo = false;
}

function undoLastChange(){
  if(undoStack.length === 0){
    showUndoToast('Nada pra desfazer');
    return;
  }
  const prev = undoStack.pop();
  redoStack.push(lastSnapshot);
  if(redoStack.length > MAX_UNDO) redoStack.shift();
  restoreSnapshot(prev);
  showUndoToast('Desfeito ↩︎');
}

function redoLastChange(){
  if(redoStack.length === 0){
    showUndoToast('Nada pra refazer');
    return;
  }
  const next = redoStack.pop();
  undoStack.push(lastSnapshot);
  if(undoStack.length > MAX_UNDO) undoStack.shift();
  restoreSnapshot(next);
  showUndoToast('Refeito ↪︎');
}

function showUndoToast(text){
  let toast = document.getElementById('undo-toast');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'undo-toast';
    toast.className = 'undo-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(toast._hideTimer);
  toast._hideTimer = setTimeout(()=> toast.classList.remove('show'), 1000);
}

// Toque duplo na área preta de fundo (fora das colunas):
// 1 dedo = desfazer · 2 dedos = refazer
function isUndoBackgroundTarget(el){
  return !!el && (el === document.body || el.id === 'board');
}
let lastBgTap = { time:0, x:0, y:0, fingers:0 };
let pendingFingerCount = 1;
document.addEventListener('touchstart', (e)=>{
  pendingFingerCount = e.touches.length;
}, { passive:true });
document.addEventListener('touchend', (e)=>{
  if(e.touches.length > 0) return; // espera soltar todos os dedos antes de avaliar
  const touch = e.changedTouches && e.changedTouches[0];
  if(!touch) return;
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  if(!isUndoBackgroundTarget(target)) return;
  const now = Date.now();
  const dx = Math.abs(touch.clientX - lastBgTap.x);
  const dy = Math.abs(touch.clientY - lastBgTap.y);
  const isDoubleTap = (now - lastBgTap.time < 350) && dx < 40 && dy < 40 && lastBgTap.fingers === pendingFingerCount;
  if(isDoubleTap){
    e.preventDefault();
    if(pendingFingerCount >= 2){ redoLastChange(); } else { undoLastChange(); }
    lastBgTap = { time:0, x:0, y:0, fingers:0 };
  } else {
    lastBgTap = { time:now, x:touch.clientX, y:touch.clientY, fingers:pendingFingerCount };
  }
}, { passive:false });
// Fallback pra mouse/desktop: duplo-clique desfaz, shift+duplo-clique refaz
document.addEventListener('dblclick', (e)=>{
  if(isUndoBackgroundTarget(e.target)){
    e.preventDefault();
    if(e.shiftKey){ redoLastChange(); } else { undoLastChange(); }
  }
});

// ---------- VOLUME ----------
function exerciseById(exId){ return catalog.find(e=>e.id===exId); }

// Insere um exercício novo junto dos outros do mesmo grupo muscular, em vez de sempre
// no final do catálogo — assim exercícios novos ficam agrupados com os "parentes".
function insertIntoCatalogByMuscle(newEx){
  const mainMuscle = newEx.contrib[0][0];
  let lastIdx = -1;
  for(let i=0;i<catalog.length;i++){
    if(catalog[i].contrib[0][0] === mainMuscle) lastIdx = i;
  }
  if(lastIdx !== -1){
    catalog.splice(lastIdx+1, 0, newEx);
    return;
  }
  // Ainda não existe nenhum exercício desse grupo — insere respeitando a ordem
  // dos grupos musculares (mesma ordem do objeto MUSCLES), em vez de ir pro final de tudo.
  const muscleKeys = Object.keys(MUSCLES);
  const targetOrder = muscleKeys.indexOf(mainMuscle);
  let insertAt = catalog.length;
  for(let i=0;i<catalog.length;i++){
    const order = muscleKeys.indexOf(catalog[i].contrib[0][0]);
    if(order > targetOrder){ insertAt = i; break; }
  }
  catalog.splice(insertAt, 0, newEx);
}

function dayVolume(day){
  const vol = {};
  day.blocks.forEach(b=>{
    const ex = exerciseById(b.exerciseId);
    if(!ex) return;
    ex.contrib.forEach(([grupo, fator])=>{
      vol[grupo] = (vol[grupo]||0) + b.series * fator;
    });
  });
  return vol;
}

function totalVolumeAllDays(){
  const vol = {};
  state.workoutDays.forEach(day=>{
    const dv = dayVolume(day);
    Object.entries(dv).forEach(([g,v])=>{ vol[g]=(vol[g]||0)+v; });
  });
  return vol;
}
function totalSeriesAllDays(){
  return state.workoutDays.reduce((s,day)=> s + day.blocks.reduce((ss,b)=>ss+b.series,0), 0);
}

function fmt(n){ return Number.isInteger(n) ? n : n.toFixed(1); }

// ---------- RENDER: MODO LIVRE ----------
function isPortraitPhone(){
  return window.matchMedia('(max-width: 700px) and (orientation: portrait)').matches;
}
function ensureActiveDay(){
  if(!state.activeDayId || !state.workoutDays.find(d=>d.id===state.activeDayId)){
    state.activeDayId = state.workoutDays[0] ? state.workoutDays[0].id : null;
  }
}

// Card de exercício — usado tanto no board (paisagem/desktop) quanto na visão de abas (retrato),
// pra manter os dois modos com exatamente o mesmo visual. A cor (fundo tingido + borda) já indica
// o grupo muscular, então não repetimos o nome do músculo em texto.
function buildExerciseCard(day, block, idx){
  const ex = exerciseById(block.exerciseId);
  if(!ex) return null;
  const mainMuscle = ex.contrib[0][0];
  const mColor = MUSCLES[mainMuscle].color;
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.blockId = block.id;
  card.style.background = mColor + '26';
  card.style.borderLeft = '5px solid ' + mColor;
  card.draggable = true;
  card.ondragstart = e=>{
    card.classList.add('dragging');
    e.dataTransfer.setData('blockId', block.id);
    e.dataTransfer.setData('fromDayId', day.id);
  };
  card.ondragend = ()=> card.classList.remove('dragging');
  card.innerHTML = `
    <div class="card-main">
      <div class="card-actions">
        <button class="card-del" title="Remover">×</button>
      </div>
      <div class="card-title-row">
        <span class="card-num">${idx+1}</span>
        <div class="card-name">${ex.nome}</div>
      </div>
      <div class="card-sub">
        <span class="card-reps">${block.series}x ${block.repsMin}-${block.repsMax}</span>
      </div>
    </div>
  `;
  card.querySelector('.card-del').onclick = (e)=>{
    e.stopPropagation();
    day.blocks = day.blocks.filter(x=>x.id!==block.id);
    renderAll();
  };
  card.onclick = (e)=>{
    if(e.target.closest('.card-actions')) return;
    openEditBlock(day.id, block.id);
  };
  return card;
}
function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  ensureActiveDay();
  if(isPortraitPhone()){
    renderPortraitTabs(board);
    return;
  }

  // dragover/drop no board tratam a reordenação das colunas (treinos) inteiras
  board.ondragover = e=>{
    if(!e.dataTransfer.types.includes('columnid')) return;
    e.preventDefault();
    const isRow = getComputedStyle(board).flexDirection !== 'column';
    const afterCol = getDragAfterColumn(board, e.clientX, e.clientY);
    showDropIndicator(board, afterCol, isRow ? 'vertical' : 'horizontal');
  };
  board.ondrop = e=>{
    if(!e.dataTransfer.types.includes('columnid')) return;
    e.preventDefault();
    removeDropIndicator();
    const draggedId = e.dataTransfer.getData('columnid');
    const afterCol = getDragAfterColumn(board, e.clientX, e.clientY);
    reorderWorkoutDay(draggedId, afterCol ? afterCol.dataset.dayId : null);
  };

  state.workoutDays.forEach(day=>{
    const col = document.createElement('div');
    col.className = 'column';
    col.dataset.dayId = day.id;
    col.ondragover = e=>{
      if(e.dataTransfer.types.includes('columnid')) return; // deixa borbulhar pro board reordenar a coluna
      e.preventDefault(); col.classList.add('dragover');
      const colBody = col.querySelector('.col-body');
      const afterEl = getDragAfterElement(colBody, e.clientY);
      showDropIndicator(colBody, afterEl, 'horizontal');
    };
    col.ondragleave = e=>{
      // só desmarca se realmente saiu da coluna (não apenas passou por cima de um filho)
      if(!col.contains(e.relatedTarget)) col.classList.remove('dragover');
    };
    col.ondrop = e=>{
      if(e.dataTransfer.types.includes('columnid')) return;
      e.preventDefault(); col.classList.remove('dragover');
      removeDropIndicator();
      const blockId = e.dataTransfer.getData('blockId');
      const fromDayId = e.dataTransfer.getData('fromDayId');
      const afterEl = getDragAfterElement(col.querySelector('.col-body'), e.clientY);
      moveBlock(blockId, fromDayId, day.id, afterEl ? afterEl.dataset.blockId : null);
    };

    // header
    const header = document.createElement('div');
    header.className = 'col-header';
    header.innerHTML = `
      <button class="col-drag-handle" title="Arrastar treino" aria-label="Arrastar treino">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>
      </button>
      <input class="col-title" value="${day.nome}" />
      <div class="col-header-btns">
        <button class="col-add-btn" title="Adicionar exercício">+</button>
      </div>
    `;
    header.querySelector('.col-title').onchange = e=>{ day.nome = e.target.value; saveToStorage(); };
    header.querySelector('.col-add-btn').onclick = ()=> openAddExercise(day.id);
    // Só a alcinha é arrastável (permanentemente) — a coluna em si nunca fica draggable,
    // então nunca disputa com o drag de um card dentro dela.
    const dragHandle = header.querySelector('.col-drag-handle');
    dragHandle.draggable = true;
    dragHandle.ondragstart = e=>{
      e.dataTransfer.setData('columnid', day.id);
      e.dataTransfer.effectAllowed = 'move';
      col.classList.add('col-dragging');
    };
    dragHandle.ondragend = ()=>{
      col.classList.remove('col-dragging');
      removeDropIndicator();
    };
    col.appendChild(header);

    // body
    const body = document.createElement('div');
    body.className = 'col-body';
    day.blocks.forEach((b, idx)=>{
      const card = buildExerciseCard(day, b, idx);
      if(card) body.appendChild(card);
    });
    col.appendChild(body);

    // footer volume
    const footer = document.createElement('div');
    footer.className = 'col-footer';
    const vol = dayVolume(day);
    const entries = Object.entries(vol);
    const totalSeries = day.blocks.reduce((s,b)=>s+b.series,0);
    let footerHtml = `
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div class="footer-label" style="margin-bottom:2px;">Total do treino</div>
          <div class="col-total-num">${totalSeries} séries</div>
        </div>
        <button class="vol-toggle" id="vol-toggle-${day.id}">${day.volumeExpanded ? '−' : '+'}</button>
      </div>`;
    if(day.volumeExpanded){
      footerHtml += `<div class="footer-label" style="margin-top:10px;">Volume por grupo</div>`;
      if(entries.length===0){
        footerHtml += `<div style="font-size:11px;color:var(--faint)">Sem exercícios ainda</div>`;
      } else {
        entries.sort((a,b)=>b[1]-a[1]).forEach(([g,v])=>{
          const m = MUSCLES[g];
          footerHtml += `
            <div class="vol-badge" style="background:${m.color}22;">
              <span class="dot" style="background:${m.color}"></span>
              <span class="name">${m.label}</span>
              <span style="font-family:var(--mono)">${fmt(v)}</span>
            </div>`;
        });
      }
    }
    footer.innerHTML = footerHtml;
    footer.querySelector('.vol-toggle').onclick = ()=>{ day.volumeExpanded = !day.volumeExpanded; renderAll(); };
    col.appendChild(footer);

    // ações do treino: duplicar + remover (lado a lado, embaixo)
    const actionsRow = document.createElement('div');
    actionsRow.className = 'col-actions';
    actionsRow.innerHTML = `
      <button class="col-dup-btn2" title="Duplicar treino"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Duplicar</button>
      <button class="col-del2" title="Remover treino"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Remover</button>
    `;
    actionsRow.querySelector('.col-dup-btn2').onclick = ()=> duplicateDay(day.id);
    actionsRow.querySelector('.col-del2').onclick = ()=>{
      state.workoutDays = state.workoutDays.filter(d=>d.id!==day.id);
      renderAll();
    };
    col.appendChild(actionsRow);

    board.appendChild(col);
  });
}

// ---------- RENDER: MODO RETRATO (celular em pé) — abas + lista agrupada, um treino por vez ----------
function renderPortraitTabs(board){
  const day = state.workoutDays.find(d=>d.id===state.activeDayId);
  const wrap = document.createElement('div');
  wrap.className = 'portrait-wrap';

  const header = document.createElement('div');
  header.className = 'portrait-header';
  header.innerHTML = `
    <div class="portrait-title-row">
      <input class="portrait-day-title" id="portrait-day-title" value="${day ? day.nome : ''}" ${day ? '' : 'disabled'} />
      <button class="portrait-day-menu" id="portrait-day-menu" aria-label="Opções do treino" ${day ? '' : 'style="visibility:hidden;"'}>
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
      </button>
    </div>
    <div class="portrait-tabs" id="portrait-tabs"></div>
  `;
  wrap.appendChild(header);

  if(day){
    header.querySelector('#portrait-day-title').onchange = e=>{
      const name = e.target.value.trim();
      if(!name){ e.target.value = day.nome; return; }
      day.nome = name; saveToStorage(); renderAll();
    };
    header.querySelector('#portrait-day-menu').onclick = ()=> openPortraitDayMenu(day.id);
  }

  const tabsEl = header.querySelector('#portrait-tabs');
  state.workoutDays.forEach(d=>{
    const pill = document.createElement('button');
    pill.className = 'portrait-tab-pill' + (day && d.id===day.id ? ' active' : '');
    pill.textContent = d.nome;
    pill.onclick = ()=>{ state.activeDayId = d.id; renderAll(); };
    tabsEl.appendChild(pill);
  });
  const addPill = document.createElement('button');
  addPill.className = 'portrait-tab-add';
  addPill.innerHTML = '+';
  addPill.setAttribute('aria-label','Novo treino');
  addPill.onclick = ()=> addTreinoToActivePlan();
  tabsEl.appendChild(addPill);

  const listWrap = document.createElement('div');
  listWrap.className = 'portrait-list-scroll';

  if(!day){
    listWrap.innerHTML = `<div class="portrait-empty">Nenhum treino ainda. Toque em + pra criar.</div>`;
    wrap.appendChild(listWrap);
    board.appendChild(wrap);
    return;
  }

  const listCard = document.createElement('div');
  listCard.className = 'portrait-list-card';
  listCard.dataset.dayId = day.id;

  listCard.ondragover = e=>{
    e.preventDefault();
    const afterEl = getDragAfterElement(listCard, e.clientY);
    showDropIndicator(listCard, afterEl, 'horizontal');
  };
  listCard.ondrop = e=>{
    e.preventDefault();
    removeDropIndicator();
    const blockId = e.dataTransfer.getData('blockId');
    const fromDayId = e.dataTransfer.getData('fromDayId');
    if(fromDayId !== day.id) return; // na visão de abas só reordena dentro do mesmo treino
    const afterEl = getDragAfterElement(listCard, e.clientY);
    moveBlock(blockId, fromDayId, day.id, afterEl ? afterEl.dataset.blockId : null);
  };

  day.blocks.forEach((b, idx)=>{
    const card = buildExerciseCard(day, b, idx);
    if(card) listCard.appendChild(card);
  });

  const addCard = document.createElement('div');
  addCard.className = 'portrait-add-card';
  addCard.innerHTML = `
    <span class="portrait-add-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" width="15" height="15"><path d="M12 5v14M5 12h14"/></svg>
    </span>
    <span class="portrait-add-label">Adicionar exercício</span>
  `;
  addCard.onclick = ()=> openAddExercise(day.id);
  listCard.appendChild(addCard);

  listWrap.appendChild(listCard);
  wrap.appendChild(listWrap);
  board.appendChild(wrap);
}

    <h3>${day.nome}</h3>

      <button class="btn-primary" id="pm-dup" style="width:100%; justify-content:center;">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Duplicar treino
      </button>
      <button class="btn-primary" id="pm-del" style="width:100%; justify-content:center; color:var(--danger);">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Remover treino
      </button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="pm-close" style="width:100%;">Fechar</button>
    </div>
  `;
  modal.querySelector('#pm-dup').onclick = ()=>{ closeModal(); duplicateDay(dayId); };
  modal.querySelector('#pm-del').onclick = ()=>{
    if(state.workoutDays.length<=1){ closeModal(); return; }
    state.workoutDays = state.workoutDays.filter(d=>d.id!==dayId);
    if(state.activeDayId === dayId){ state.activeDayId = state.workoutDays[0] ? state.workoutDays[0].id : null; }
    closeModal();
    renderAll();
  };
  modal.querySelector('#pm-close').onclick = closeModal;
  document.getElementById('overlay').classList.add('show');
}

function duplicateDay(dayId){
  const day = state.workoutDays.find(d=>d.id===dayId);
  if(!day) return;
  const copy = {
    id: id(),
    nome: day.nome,
    volumeExpanded: day.volumeExpanded,
    blocks: day.blocks.map(b=>({ id:id(), exerciseId:b.exerciseId, series:b.series, repsMin:b.repsMin, repsMax:b.repsMax })),
  };
  const idx = state.workoutDays.findIndex(d=>d.id===dayId);
  state.workoutDays.splice(idx+1, 0, copy);
  state.activeDayId = copy.id;
  renderAll();
}

function moveBlock(blockId, fromDayId, toDayId, beforeBlockId){
  const fromDay = state.workoutDays.find(d=>d.id===fromDayId);
  const toDay = state.workoutDays.find(d=>d.id===toDayId);
  if(!fromDay || !toDay) return;
  const idx = fromDay.blocks.findIndex(b=>b.id===blockId);
  if(idx===-1) return;
  const [block] = fromDay.blocks.splice(idx,1);
  let insertIdx = toDay.blocks.length;
  if(beforeBlockId){
    const bi = toDay.blocks.findIndex(b=>b.id===beforeBlockId);
    if(bi!==-1) insertIdx = bi;
  }
  toDay.blocks.splice(insertIdx, 0, block);
  renderAll();
}

// Retorna o card depois do qual o item solto deve ser inserido (null = inserir no fim)
function getDragAfterElement(container, y){
  const cards = [...container.querySelectorAll('.card:not(.dragging)')];
  return cards.reduce((closest, child)=>{
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset < 0 && offset > closest.offset){
      return { offset, element: child };
    }
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY, element: null }).element;
}

// Retorna a coluna antes da qual o treino arrastado deve ser inserido (null = inserir no fim)
// Detecta o eixo automaticamente: lado a lado (retrato usa empilhado, então compara Y; paisagem compara X)
function getDragAfterColumn(container, x, y){
  const isRow = getComputedStyle(container).flexDirection !== 'column';
  const cols = [...container.querySelectorAll('.column:not(.col-dragging)')];
  return cols.reduce((closest, child)=>{
    const box = child.getBoundingClientRect();
    const offset = isRow ? (x - box.left - box.width/2) : (y - box.top - box.height/2);
    if(offset < 0 && offset > closest.offset){
      return { offset, element: child };
    }
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY, element: null }).element;
}

function reorderWorkoutDay(draggedId, beforeId){
  const days = state.workoutDays;
  const fromIdx = days.findIndex(d=>d.id===draggedId);
  if(fromIdx===-1) return;
  const [day] = days.splice(fromIdx, 1);
  let insertIdx = days.length;
  if(beforeId){
    const bi = days.findIndex(d=>d.id===beforeId);
    if(bi!==-1) insertIdx = bi;
  }
  days.splice(insertIdx, 0, day);
  renderAll();
}

// ---------- INDICADOR VISUAL DE "VAI ENCAIXAR AQUI" (arrastar cards e colunas) ----------
let dropIndicatorEl = null;
function showDropIndicator(container, beforeEl, orientation){
  if(!dropIndicatorEl){
    dropIndicatorEl = document.createElement('div');
    dropIndicatorEl.className = 'drop-indicator';
  }
  dropIndicatorEl.className = 'drop-indicator ' + orientation;
  if(beforeEl) container.insertBefore(dropIndicatorEl, beforeEl);
  else container.appendChild(dropIndicatorEl);
}
function removeDropIndicator(){
  if(dropIndicatorEl && dropIndicatorEl.parentNode){
    dropIndicatorEl.parentNode.removeChild(dropIndicatorEl);
  }
}
// segurança: qualquer drag que termine (solto dentro ou fora de um alvo válido) limpa o indicador
document.addEventListener('dragend', removeDropIndicator);

// ---------- BOTÃO REDONDO DE VOLUME SEMANAL ----------
function renderVolumeWidget(){
  const vol = totalVolumeAllDays();
  const entries = Object.entries(vol);
  const totalSeries = totalSeriesAllDays();

  // se o grupo selecionado não existe mais no volume atual, volta pro geral
  if(volumeDisplaySelection !== 'geral' && !vol[volumeDisplaySelection]){
    volumeDisplaySelection = 'geral';
  }

  // atualiza ícone + número do botão minimizado conforme a seleção
  const iconEl = document.getElementById('volume-fab-icon');
  if(volumeDisplaySelection === 'geral'){
    iconEl.innerHTML = `<svg viewBox="0 0 24 24" width="19" height="19" fill="currentColor"><rect x="3" y="11" width="4" height="9" rx="1"/><rect x="10" y="6" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="17" rx="1"/></svg>`;
    document.getElementById('volume-fab-dot').textContent = totalSeries;
  } else {
    const m = MUSCLES[volumeDisplaySelection];
    iconEl.innerHTML = `<span style="width:15px;height:15px;border-radius:50%;background:${m.color};display:block;box-shadow:0 0 8px ${m.color}"></span>`;
    document.getElementById('volume-fab-dot').textContent = fmt(vol[volumeDisplaySelection] || 0);
  }

  // lista do painel: "Geral" no topo + um item por grupo muscular tocado
  const bodyEl = document.getElementById('volume-panel-badges');
  let rowsHtml = `<div class="vol-badge selectable ${volumeDisplaySelection==='geral'?'selected':''}" data-key="geral" style="background:var(--glass);">
    <span class="dot" style="background:var(--sub)"></span>
    <span class="name">Geral</span>
    <span style="font-family:var(--mono)">${totalSeries}</span>
    <span class="check">${volumeDisplaySelection==='geral'?'✓':''}</span>
  </div>`;
  if(entries.length===0){
    rowsHtml += `<div style="font-size:11px;color:var(--faint);padding:6px 2px;">Adicione exercícios pra ver o volume por grupo</div>`;
  } else {
    rowsHtml += entries.sort((a,b)=>b[1]-a[1]).map(([g,v])=>{
      const m = MUSCLES[g];
      const isSel = volumeDisplaySelection === g;
      return `<div class="vol-badge selectable ${isSel?'selected':''}" data-key="${g}" style="background:${m.color}22;">
        <span class="dot" style="background:${m.color}"></span>
        <span class="name">${m.label}</span>
        <span style="font-family:var(--mono)">${fmt(v)}</span>
        <span class="check">${isSel?'✓':''}</span>
      </div>`;
    }).join('');
  }
  bodyEl.innerHTML = rowsHtml;
  bodyEl.querySelectorAll('.vol-badge.selectable').forEach(row=>{
    row.onclick = ()=>{
      volumeDisplaySelection = row.dataset.key;
      saveToStorage();
      renderVolumeWidget();
    };
  });
}

    actions.innerHTML = `
      <button class="btn-cancel" id="cancel-add">Fechar</button>
      <button class="btn-confirm" id="confirm-add" ${selected.size===0?'disabled':''}>Adicionar (${selected.size})</button>
    `;
    actions.querySelector('#cancel-add').onclick = closeModal;
    actions.querySelector('#confirm-add').onclick = ()=>{
      if(selected.size===0) return;
      const day = state.workoutDays.find(d=>d.id===dayId);
      selected.forEach(exId=>{
        day.blocks.push({ id:id(), exerciseId:exId, series:3, repsMin:8, repsMax:10 });
      });
      closeModal(); renderAll();
    };
  };

  const normalize = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();

  const showCatalog = ()=>{
    modal.querySelector('.tab-catalog').classList.add('active');
    modal.querySelector('.tab-custom').classList.remove('active');
    selected = new Set();
    const muscleOptions = Object.entries(MUSCLES).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
    tabBody.innerHTML = `
      <div class="search-row">
        <input id="ex-search" placeholder="Buscar exercício..." />
        <select id="ex-filter-muscle">
          <option value="">Todos os músculos</option>
          ${muscleOptions}
        </select>
      </div>
      <div class="catalog-list" id="catalog-list"></div>
    `;
    const listEl = tabBody.querySelector('#catalog-list');
    const searchEl = tabBody.querySelector('#ex-search');
    const filterEl = tabBody.querySelector('#ex-filter-muscle');

    const renderList = ()=>{
      const term = normalize(searchEl.value.trim());
      const muscleFilter = filterEl.value;
      const filtered = catalog.filter(ex=>{
        const matchesTerm = !term || normalize(ex.nome).includes(term);
        const matchesMuscle = !muscleFilter || ex.contrib[0][0] === muscleFilter;
        return matchesTerm && matchesMuscle;
      });
      if(filtered.length===0){
        listEl.innerHTML = `<div class="catalog-empty">Nenhum exercício encontrado</div>`;
        return;
      }
      listEl.innerHTML = filtered.map(ex=>{
        const main = MUSCLES[ex.contrib[0][0]];
        const musclesLabel = ex.contrib.map(([g])=>MUSCLES[g].label).join(' · ');
        const isSelected = selected.has(ex.id);
        return `<div class="catalog-item ${isSelected?'selected':''}" data-id="${ex.id}">
          <span class="check">${isSelected?'✓':''}</span>
          <span class="dot" style="background:${main.color}"></span>
          <div><div class="n">${ex.nome}</div><div class="m">${musclesLabel}</div></div>
        </div>`;
      }).join('');
      listEl.querySelectorAll('.catalog-item').forEach(item=>{
        item.onclick = ()=>{
          const exId = item.dataset.id;
          if(selected.has(exId)){ selected.delete(exId); item.classList.remove('selected'); item.querySelector('.check').textContent=''; }
          else { selected.add(exId); item.classList.add('selected'); item.querySelector('.check').textContent='✓'; }
          renderCatalogActions();
        };
      });
    };
    searchEl.oninput = renderList;
    filterEl.onchange = renderList;
    renderList();
    renderCatalogActions();
  };

  const showCustom = ()=>{
    modal.querySelector('.tab-catalog').classList.remove('active');
    modal.querySelector('.tab-custom').classList.add('active');
    const muscleOptions = Object.entries(MUSCLES).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
    tabBody.innerHTML = `
      <div class="field"><label>Nome do exercício</label><input id="new-ex-name" placeholder="Ex: Cadeira extensora" /></div>
      <div class="field"><label>Músculo principal</label><select id="new-ex-main">${muscleOptions}</select></div>
      <div id="secondary-list"></div>
      <div class="add-secondary" id="add-secondary">+ Adicionar músculo secundário</div>
    `;
    actions.innerHTML = `
      <button class="btn-cancel" id="cancel-add">Fechar</button>
      <button class="btn-confirm" id="save-custom">Salvar e adicionar</button>
    `;
    actions.querySelector('#cancel-add').onclick = closeModal;
    let secondaries = [];
    const renderSecondaries = ()=>{
      document.getElementById('secondary-list').innerHTML = secondaries.map((s,i)=>`
        <div class="secondary-row">
          <div class="field" style="flex:2"><select data-i="${i}" class="sec-muscle">${muscleOptions}</select></div>
          <div class="field" style="flex:1"><select data-i="${i}" class="sec-fator">
            <option value="0.25">0.25</option><option value="0.33">0.33</option>
            <option value="0.5" selected>0.5</option><option value="0.75">0.75</option>
          </select></div>
          <button class="rm-secondary" data-i="${i}">×</button>
        </div>
      `).join('');
      document.querySelectorAll('.sec-muscle').forEach(sel=>{
        sel.value = secondaries[sel.dataset.i].muscle;
        sel.onchange = e=> secondaries[e.target.dataset.i].muscle = e.target.value;
      });
      document.querySelectorAll('.sec-fator').forEach(sel=>{
        sel.value = secondaries[sel.dataset.i].fator;
        sel.onchange = e=> secondaries[e.target.dataset.i].fator = parseFloat(e.target.value);
      });
      document.querySelectorAll('.rm-secondary').forEach(btn=>{
        btn.onclick = ()=>{ secondaries.splice(btn.dataset.i,1); renderSecondaries(); };
      });
    };
    document.getElementById('add-secondary').onclick = ()=>{
      secondaries.push({muscle:'core', fator:0.5});
      renderSecondaries();
    };
    actions.querySelector('#save-custom').onclick = ()=>{
      const nameInput = document.getElementById('new-ex-name');
      const name = nameInput.value.trim();
      if(!name){ nameInput.style.borderColor = '#D94F4F'; nameInput.placeholder = 'Dá um nome pro exercício'; nameInput.focus(); return; }
      const main = document.getElementById('new-ex-main').value;
      const newEx = { id:id(), nome:name, contrib:[[main,1], ...secondaries.map(s=>[s.muscle,s.fator])] };
      insertIntoCatalogByMuscle(newEx);
      const day = state.workoutDays.find(d=>d.id===dayId);
      day.blocks.push({ id:id(), exerciseId:newEx.id, series:3, repsMin:8, repsMax:10 });
      closeModal(); renderAll();
    };
  };
  modal.querySelector('.tab-catalog').onclick = showCatalog;
  modal.querySelector('.tab-custom').onclick = showCustom;
  showCatalog();
  document.getElementById('overlay').classList.add('show');
}

function openSwapExercise(dayId, blockId){
  const day = state.workoutDays.find(d=>d.id===dayId);
  const block = day.blocks.find(b=>b.id===blockId);
  const currentEx = exerciseById(block.exerciseId);
  if(!currentEx) return;
  const mainMuscle = currentEx.contrib[0][0];
  const m = MUSCLES[mainMuscle];
  const options = catalog.filter(ex => ex.contrib[0][0] === mainMuscle && ex.id !== currentEx.id);
  const modal = document.getElementById('modal-content');
  modal.innerHTML = `
    <h3>Trocar "${currentEx.nome}"</h3>
    <div class="footer-label" style="margin-bottom:10px;">Outros exercícios de ${m.label}</div>
    <div class="catalog-list" id="swap-list"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancel-swap">Fechar</button>
    </div>
  `;
  const listEl = modal.querySelector('#swap-list');
  if(options.length === 0){
    listEl.innerHTML = `<div class="catalog-empty">Não achei outro exercício de ${m.label} no banco ainda. Crie um novo pelo "+" da coluna.</div>`;
  } else {
    listEl.innerHTML = options.map(ex=>{
      const musclesLabel = ex.contrib.map(([g])=>MUSCLES[g].label).join(' · ');
      return `<div class="catalog-item" data-id="${ex.id}">
        <span class="dot" style="background:${m.color}"></span>
        <div><div class="n">${ex.nome}</div><div class="m">${musclesLabel}</div></div>
      </div>`;
    }).join('');
    listEl.querySelectorAll('.catalog-item').forEach(item=>{
      item.onclick = ()=>{
        block.exerciseId = item.dataset.id;
        closeModal();
        renderAll();
      };
    });
  }
  modal.querySelector('#cancel-swap').onclick = closeModal;
  document.getElementById('overlay').classList.add('show');
}

function renderPlanList(){
  const listEl = document.getElementById('plan-list');
  listEl.innerHTML = appState.plans.map(p=>{
    const isActive = p.id === appState.activePlanId;
    const n = p.workoutDays.length;
    const dupBtn = `<button class="plan-row-dup" data-id="${p.id}" title="Duplicar divisão">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    </button>`;
    if(isActive){
      return `<div class="plan-row active" data-id="${p.id}">
        <div class="plan-row-main">
          <input class="plan-rename-input" id="plan-rename-input" value="${p.nome}" />
          <div class="plan-row-meta">${n} treino${n===1?'':'s'} · atual — toque pra renomear</div>
        </div>
        <div class="plan-row-actions">${dupBtn}</div>
      </div>`;
    }
    return `<div class="plan-row" data-id="${p.id}">
      <div class="plan-row-main">
        <div class="plan-row-name">${p.nome}</div>
        <div class="plan-row-meta">${n} treino${n===1?'':'s'}</div>
      </div>
      <div class="plan-row-actions">
        ${dupBtn}
        ${appState.plans.length>1 ? `<button class="plan-row-del" data-id="${p.id}" title="Excluir divisão">×</button>` : ''}
      </div>
    </div>`;
  }).join('');

  const renameInput = listEl.querySelector('#plan-rename-input');
  if(renameInput){
    renameInput.onchange = e=>{
      const name = e.target.value.trim();
      if(!name){ e.target.value = state.nome; return; }
      state.nome = name;
      saveToStorage();
      renderPlanList();
    };
  }
  listEl.querySelectorAll('.plan-row:not(.active)').forEach(row=>{
    row.onclick = ()=>{
      const pid = row.dataset.id;
      appState.activePlanId = pid;
      state = appState.plans.find(p=>p.id===pid);
      saveToStorage();
      closeModal();
      renderAll();
    };
  });
  listEl.querySelectorAll('.plan-row-del').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      if(appState.plans.length<=1) return;
      const pid = btn.dataset.id;
      appState.plans = appState.plans.filter(p=>p.id!==pid);
      if(appState.activePlanId === pid){
        appState.activePlanId = appState.plans[0].id;
        state = appState.plans[0];
      }
      saveToStorage();
      renderPlanList();
      renderAll();
    };
  });
  listEl.querySelectorAll('.plan-row-dup').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      duplicatePlan(btn.dataset.id);
    };
  });
}

function duplicatePlan(planId){
  const plan = appState.plans.find(p=>p.id===planId);
  if(!plan) return;
  const copy = {
    id: id(),
    nome: plan.nome + ' (cópia)',
    workoutDays: plan.workoutDays.map(day=>({
      id: id(),
      nome: day.nome,
      volumeExpanded: day.volumeExpanded,
      blocks: day.blocks.map(b=>({ id:id(), exerciseId:b.exerciseId, series:b.series, repsMin:b.repsMin, repsMax:b.repsMax })),
    })),
  };
  const idx = appState.plans.findIndex(p=>p.id===planId);
  appState.plans.splice(idx+1, 0, copy);
  saveToStorage();
  renderPlanList();
}

// ---------- ALINHAMENTO DE LINHAS ENTRE COLUNAS (lado a lado) ----------
// A altura de cada "linha" (mesma posição em colunas diferentes) se ajusta pelo card mais alto
// daquela posição, sem truncar texto nenhum. Só faz sentido quando as colunas estão lado a lado
// (paisagem/desktop) — no empilhado (retrato) cada coluna já ocupa a largura toda sozinha.
function syncCardRowHeights(){
  const board = document.getElementById('board');
  if(!board) return;
  const columns = [...board.querySelectorAll('.column')];
  const rows = columns.map(col => [...col.querySelectorAll('.col-body > .card')]);
  // zera alturas forçadas antes de medir, senão a medição parte de um valor já esticado
  rows.forEach(cards => cards.forEach(c => { c.style.minHeight = ''; }));
  const isRow = getComputedStyle(board).flexDirection !== 'column';
  if(!isRow) return;
  const maxLen = Math.max(0, ...rows.map(cards => cards.length));
  for(let i = 0; i < maxLen; i++){
    let maxH = 0;
    rows.forEach(cards => { if(cards[i]) maxH = Math.max(maxH, cards[i].getBoundingClientRect().height); });
    rows.forEach(cards => { if(cards[i]) cards[i].style.minHeight = maxH + 'px'; });
  }
}

function showAuthGate(show){
  document.getElementById('auth-gate').classList.toggle('hidden', !show);
}
function showAuthLoading(show){
  document.getElementById('auth-loading').classList.toggle('hidden', !show);
}

async function startAppForUser(userId){
  currentUserId = userId;
  const remote = await loadRemoteState(userId);
  if(remote){
    applySavedState(remote);
  } else {
    // primeira vez desse usuário: manda o que já tinha localmente (ou o padrão) pro Supabase
    await saveRemoteStateNow();
  }
  lastSnapshot = JSON.stringify({ plans: appState.plans, activePlanId: appState.activePlanId });
  showAuthLoading(false);
  showAuthGate(false);
  renderAll();
}

function wireAuthForm(){
  const emailInput = document.getElementById('auth-email');
  const passInput = document.getElementById('auth-password');
  const signinBtn = document.getElementById('auth-signin-btn');
  const signupBtn = document.getElementById('auth-signup-btn');
  const statusEl = document.getElementById('auth-status');

  const readCreds = ()=>{
    const email = emailInput.value.trim();
    const password = passInput.value;
    if(!email || !email.includes('@')){ statusEl.textContent = 'Digite um e-mail válido.'; return null; }
    if(password.length < 6){ statusEl.textContent = 'A senha precisa ter pelo menos 6 caracteres.'; return null; }
    return { email, password };
  };

  const signIn = async ()=>{
    const creds = readCreds();
    if(!creds) return;
    signinBtn.disabled = true;
    statusEl.textContent = 'Entrando…';
    const { error } = await supabaseClient.auth.signInWithPassword(creds);
    signinBtn.disabled = false;
    if(error){ statusEl.textContent = 'Erro: ' + error.message; return; }
    statusEl.textContent = 'Tudo certo!';
    // não precisa fazer nada aqui — o onAuthStateChange (SIGNED_IN) cuida de entrar no app
  };

  const signUp = async ()=>{
    const creds = readCreds();
    if(!creds) return;
    signupBtn.disabled = true;
    statusEl.textContent = 'Criando conta…';
    const { error } = await supabaseClient.auth.signUp(creds);
    signupBtn.disabled = false;
    if(error){ statusEl.textContent = 'Erro: ' + error.message; return; }
    statusEl.textContent = 'Conta criada!';
  };

  signinBtn.onclick = signIn;
  signupBtn.onclick = signUp;
  [emailInput, passInput].forEach(inp=>{
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter') signIn(); });
  });
}

async function signOut(){
  if(!supabaseClient) return;
  await supabaseClient.auth.signOut();
  currentUserId = null;
  closeModal();
  showAuthLoading(false);
  showAuthGate(true);
}

async function boot(){
  if(!supabaseClient){
    // Supabase ainda não configurado — funciona só localmente, como antes
    showAuthLoading(false);
    renderAll();
    return;
  }
  wireAuthForm();
  const { data:{ session } } = await supabaseClient.auth.getSession();
  if(session && session.user){
    await startAppForUser(session.user.id);
  } else {
    showAuthLoading(false);
    showAuthGate(true);
  }
  supabaseClient.auth.onAuthStateChange((event, session)=>{
    if(event === 'SIGNED_IN' && session && session.user && session.user.id !== currentUserId){
      showAuthGate(false);
      showAuthLoading(true);
      startAppForUser(session.user.id);
    }
    if(event === 'SIGNED_OUT'){
      currentUserId = null;
      showAuthGate(true);
    }
  });
}

// ---------- TEMA (claro / escuro) + TOP BAR ----------
const SUN_ICON = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
const MOON_ICON = '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
function currentTheme(){ return document.documentElement.dataset.theme || 'dark'; }
function applyTheme(t){
  document.documentElement.dataset.theme = t;
  try{ localStorage.setItem('treino-theme', t); }catch(e){}
  const isDark = t === 'dark';
  const txt = document.getElementById('theme-toggle-text');
  const icon = document.getElementById('theme-toggle-icon');
  if(txt) txt.textContent = isDark ? 'Claro' : 'Escuro';
  if(icon) icon.innerHTML = isDark ? SUN_ICON : MOON_ICON;
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content', isDark ? '#0a0c15' : '#eef1f7');
}
function initTheme(){
  let t = 'dark';
  try{ t = localStorage.getItem('treino-theme') || 'dark'; }catch(e){}
  applyTheme(t);
}
function updateTopbar(){
  const el = document.getElementById('topbar-plan-name');
  if(el && state) el.textContent = state.nome;
}
initTheme();
document.getElementById('theme-toggle').onclick = ()=> applyTheme(currentTheme()==='dark' ? 'light' : 'dark');
document.getElementById('topbar-title').onclick = openPlanSwitcher;

boot();
</script>
</body>
